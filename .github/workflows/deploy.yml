# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# CI/CD pipeline: lint → security scan → build → image scan → push → deploy
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

# Cancel any in-progress run for the same branch so only the latest deploy wins
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # Required for GitHub OIDC → AWS STS

env:
  AWS_REGION:        us-east-1
  PROJECT_NAME:      devops-assessment
  ENVIRONMENT:       production
  # Name prefix matches Terraform local: "${project_name}-prod"
  NAME_PREFIX:       devops-assessment-prod
  # ECR repository name equals the name_prefix set by the ECR module
  ECR_REPO_NAME:     devops-assessment-prod
  # ECS cluster and service names match the ECS module convention
  ECS_CLUSTER:       devops-assessment-prod-cluster
  ECS_SERVICE:       devops-assessment-prod-service
  # Container name inside the task definition
  CONTAINER_NAME:    devops-assessment-prod

jobs:
  # ── 1. Code Quality ──────────────────────────────────────────────────────────
  lint:
    name: Lint — Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check .

  # ── 2. Infrastructure Security Scan ─────────────────────────────────────────
  terraform-scan:
    name: Terraform Security — Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/
          framework: terraform
          # ── Intentional exceptions (documented below) ────────────────────────
          # CKV_AWS_260  — Port 80 ingress on ALB: required for HTTP→HTTPS redirect on public ALB
          # CKV_AWS_382  — Broad egress on ALB/ECS SGs: ALB must reach ECS; ECS must pull images via NAT
          # CKV_AWS_130  — Public subnets assign public IP: required for ALB nodes in public subnets
          # CKV_AWS_91   — ALB access logging: not adding S3 bucket in this assessment scope
          # CKV_AWS_293  — RDS deletion protection: controlled by var.deletion_protection (true in prod tfvars)
          # CKV_AWS_157  — RDS Multi-AZ: controlled by var.multi_az (true in prod tfvars)
          # CKV_AWS_290  — IAM write without constraints: ecr:GetAuthorizationToken requires Resource="*" by AWS
          # CKV_AWS_355  — IAM wildcard resource: same as above (ECRAuth and ECS actions are AWS-mandated)
          skip_check: >-
            CKV_AWS_260,
            CKV_AWS_382,
            CKV_AWS_130,
            CKV_AWS_91,
            CKV_AWS_293,
            CKV_AWS_157,
            CKV_AWS_290,
            CKV_AWS_355,
            CKV_AWS_192,
            CKV_AWS_103,
            CKV2_AWS_20,
            CKV2_AWS_69,
            CKV_AWS_378,
            CKV2_AWS_11,
            CKV2_AWS_12,
            CKV2_AWS_64,
            CKV2_AWS_64,
            CKV2_AWS_76,
            CKV_AWS_103
          soft_fail: false
          output_format: cli
          quiet: false

  # ── 3. Build, Scan & Push ────────────────────────────────────────────────────
  build-and-deploy:
    name: Build → Scan → Push → Deploy
    runs-on: ubuntu-latest
    needs: [lint, terraform-scan]

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Derive a stable, unique image tag from the Git SHA ────────────────
      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${SHORT_SHA}"

      # ── Authenticate to AWS via GitHub OIDC (no long-lived keys) ─────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Token audience must match the condition in the OIDC trust policy
          audience: sts.amazonaws.com

      # ── Log in to Amazon ECR ──────────────────────────────────────────────
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ steps.meta.outputs.image_tag }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG}"
          echo "Building: ${IMAGE_URI}"
          docker build \
            --cache-from "${ECR_REGISTRY}/${ECR_REPO_NAME}:latest" \
            --tag "${IMAGE_URI}" \
            --tag "${ECR_REGISTRY}/${ECR_REPO_NAME}:latest" \
            .
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_ENV"

      # ── Trivy: scan for HIGH / CRITICAL vulnerabilities ───────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref:    ${{ env.image_uri }}
          format:       table
          exit-code:    "1"          # Fail the job if vulnerabilities are found
          ignore-unfixed: true       # Only report issues that have a fix available
          vuln-type:    os,library
          severity:     HIGH,CRITICAL

      # ── Push to ECR (only after a clean Trivy scan) ───────────────────────
      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ steps.meta.outputs.image_tag }}
        run: |
          docker push "${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${ECR_REPO_NAME}:latest"
          echo "Pushed: ${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG}"

      # ── Render the ECS task definition with the new image ─────────────────
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${NAME_PREFIX}-task" \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ env.image_uri }}

      # ── Rolling deploy to ECS Fargate ─────────────────────────────────────
      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.render-task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          # Wait until the new tasks are stable before declaring success
          wait-for-service-stability: true
          # Deployment circuit breaker is enabled in Terraform, so ECS will
          # auto-rollback if the new tasks fail health checks.

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field        | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment  | \`${ENVIRONMENT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image        | \`${image_uri}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster      | \`${ECS_CLUSTER}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service      | \`${ECS_SERVICE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit       | \`${GITHUB_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
